[project]
site_name = "Typed Bit2Me"
site_description = "Fully typed, validated async client for the Bit2Me API."
repo_name = "bit2me"
repo_url = "https://github.com/tribulnation/bit2me"
copyright = """
Copyright &copy; 2026 Tribulnation
"""
nav = [
  { "Intro" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "API Keys Setup" = "api-keys.md" },
  { "API Overview" = "api-overview.md" },
  { "How To" = [
    { "Overview" = "how-to/index.md" },
    "how-to/fetch-market-data.md",
    "how-to/place-and-manage-orders.md",
    "how-to/fetch-balances-and-transactions.md",
    "how-to/move-funds-and-pockets.md",
    "how-to/fetch-earn-and-asset-data.md",
  ] },
  { "Reference" = [
    { "Overview" = "reference/index.md" },
    "reference/async-usage.md",
    "reference/error-handling.md",
    "reference/env-vars.md",
    { "API" = [
      { "Overview" = "reference/api/index.md" },
      "reference/api/api.md",
      "reference/api/v1.md",
      "reference/api/v2.md",
      "reference/api/v3.md",
    ] },
  ] },
]

[project.theme]
language = "en"
logo = "media/logo.png"
favicon = "media/logo.png"
features = [
  "content.code.copy",
]

[[project.theme.palette]]
scheme = "slate"
primary = "black"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "black"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.extra]
homepage = "https://tribulnation.com"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]

[project.plugins.mkdocstrings.handlers.python]
paths = ["pkg/src"]
inventories = ["https://docs.python.org/3/objects.inv"]
